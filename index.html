<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽牌室</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-2: #fffaf0;
    --ink: #4a3a42;
    --ink-soft: #6b5560;
    --ink-dim: #a89aa0;
    --accent: #c97a8e;
    --accent-soft: #e0a8b5;
    --accent-bg: rgba(201, 122, 142, 0.06);
    --line: rgba(74, 58, 66, 0.12);
    --line-soft: rgba(74, 58, 66, 0.06);
    --serif-en: 'Cormorant Garamond', serif;
    --serif-tc: 'Noto Serif TC', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    color: var(--ink);
    font-family: var(--serif-tc);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* 白底 + 溫柔粉色光暈(中間留白) */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255, 200, 215, 0.158), transparent 60%),
      radial-gradient(ellipse 50% 45% at -10% 20%, rgba(255, 218, 228, 0.175), transparent 60%),
      radial-gradient(ellipse 50% 45% at 110% 80%, rgba(255, 210, 220, 0.14), transparent 60%);
    z-index: 0;
    pointer-events: none;
  }

  /* 細微紙質紋理 */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 25% 25%, rgba(201, 122, 142, 0.03) 1px, transparent 1px),
      radial-gradient(circle at 75% 75%, rgba(201, 122, 142, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 28px 32px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  .ornament {
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.4em;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  h1 {
    font-family: var(--serif-en);
    font-weight: 300;
    font-style: italic;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1;
    letter-spacing: -0.01em;
  }

  h1 .tc {
    display: block;
    font-family: var(--serif-tc);
    font-style: normal;
    font-weight: 300;
    font-size: 0.32em;
    letter-spacing: 0.6em;
    margin-top: 10px;
    color: var(--ink-dim);
    padding-left: 0.6em;
  }

  .tools {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .tool {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 14px 12px;
    cursor: pointer;
    font-family: var(--serif-tc);
    font-size: 14px;
    letter-spacing: 0.15em;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .tool::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(139, 111, 58, 0.08));
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .tool:hover {
    color: var(--ink);
    border-color: var(--accent-soft);
    background: rgba(255, 255, 255, 0.8);
  }

  .tool:hover::before { opacity: 1; }

  .tool.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  .tool .num {
    display: block;
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-dim);
    margin-top: 6px;
    letter-spacing: 0.1em;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 14px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .count-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .count-label {
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
  }

  .count-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--accent);
    font-family: var(--serif-en);
    font-size: 22px;
    width: 48px;
    text-align: center;
    padding: 2px 0;
    transition: border-color 0.3s;
  }

  .count-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .count-input:disabled {
    color: var(--ink-dim);
    opacity: 0.4;
  }

  .draw-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 28px;
    font-family: var(--serif-tc);
    font-size: 13px;
    letter-spacing: 0.4em;
    cursor: pointer;
    transition: all 0.4s ease;
    text-indent: 0.4em;
  }

  .draw-btn:hover {
    background: var(--accent);
    color: #ffffff;
    letter-spacing: 0.5em;
  }

  /* 控制區內的補抽與複製按鈕(抽完後出現在抽牌按鈕旁) */
  .secondary-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .secondary-actions:empty { display: none; }

  .secondary-actions .action-btn {
    background: transparent;
    border: 1px dashed var(--accent-soft);
    color: var(--ink-soft);
    padding: 10px 18px;
    font-family: var(--serif-tc);
    font-size: 12px;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: all 0.3s ease;
    text-indent: 0.25em;
  }

  .secondary-actions .action-btn:hover:not(:disabled) {
    color: var(--accent);
    border-color: var(--accent);
    border-style: solid;
    background: var(--accent-bg);
  }

  .secondary-actions .action-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: var(--line);
    color: var(--ink-dim);
  }

  /* 補抽按鈕內嵌的小數字框 */
  .extra-btn-combo {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    text-indent: 0;
  }

  .extra-count {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--accent-soft);
    color: var(--accent);
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 16px;
    width: 28px;
    text-align: center;
    padding: 0;
    margin: 0 2px;
    -moz-appearance: textfield;
  }

  .extra-count::-webkit-outer-spin-button,
  .extra-count::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .extra-count:focus {
    outline: none;
    border-bottom-color: var(--accent);
  }

  .extra-count:disabled {
    color: var(--ink-dim);
    border-bottom-color: var(--line);
    opacity: 0.6;
  }

  .extra-suffix {
    font-family: var(--serif-tc);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  .secondary-actions .action-btn.copied {
    color: var(--accent);
    border-color: var(--accent);
    border-style: solid;
    background: var(--accent-bg);
  }

  .secondary-actions .action-btn .symbol {
    font-family: var(--serif-en);
    font-style: italic;
    margin-right: 4px;
  }

  .results {
    min-height: 0;
  }

  .empty {
    text-align: center;
    color: var(--ink-dim);
    font-style: italic;
    font-family: var(--serif-en);
    font-size: 16px;
    padding: 24px 0;
    opacity: 0.6;
  }

  .results { min-height: 0; }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 28px;
  }

  /* 塔羅牌的牌卡長方形視覺 */
  .tarot-spread {
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 14px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    padding: 8px 0;
  }

  .tarot-card {
    flex: 1 1 140px;
    max-width: 180px;
    min-width: 120px;
    aspect-ratio: 5 / 8.5;
    background: linear-gradient(170deg, #fff 0%, #fdf6f7 100%);
    border: 1px solid var(--accent-soft);
    border-radius: 6px;
    padding: 24px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
    position: relative;
    box-shadow:
      0 1px 2px rgba(201, 122, 142, 0.08),
      0 8px 24px rgba(201, 122, 142, 0.10);
    overflow: hidden;
  }

  /* 只有有 data-new 標記的牌會跑動畫 */
  .tarot-card[data-new] {
    animation: cardFlip 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  }
  .tarot-card[data-new="0"] { animation-delay: 0.05s; }
  .tarot-card[data-new="1"] { animation-delay: 0.25s; }
  .tarot-card[data-new="2"] { animation-delay: 0.45s; }
  .tarot-card[data-new="3"] { animation-delay: 0.65s; }
  .tarot-card[data-new="4"] { animation-delay: 0.85s; }

  @keyframes cardFlip {
    from {
      opacity: 0;
      transform: translateY(20px) rotateY(-30deg);
    }
    to {
      opacity: 1;
      transform: translateY(0) rotateY(0);
    }
  }

  /* 牌卡內框裝飾 */
  .tarot-card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(201, 122, 142, 0.25);
    border-radius: 3px;
    pointer-events: none;
  }

  /* 四角小裝飾 */
  .tarot-card::after {
    content: '';
    position: absolute;
    inset: 10px;
    background-image:
      radial-gradient(circle at 0 0, var(--accent-soft) 1.5px, transparent 1.5px),
      radial-gradient(circle at 100% 0, var(--accent-soft) 1.5px, transparent 1.5px),
      radial-gradient(circle at 0 100%, var(--accent-soft) 1.5px, transparent 1.5px),
      radial-gradient(circle at 100% 100%, var(--accent-soft) 1.5px, transparent 1.5px);
    background-size: 8px 8px;
    background-position: 0 0, 100% 0, 0 100%, 100% 100%;
    background-repeat: no-repeat;
    pointer-events: none;
    opacity: 0.6;
  }

  .tarot-card-num {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.15em;
    z-index: 1;
    position: relative;
    margin-top: 4px;
  }

  .tarot-card-icon {
    font-family: 'Cormorant Garamond', 'Times New Roman', 'Apple Symbols', 'Segoe UI Symbol', serif;
    font-variant-emoji: text;
    text-rendering: optimizeLegibility;
    font-size: 32px;
    color: var(--accent);
    line-height: 1;
    z-index: 1;
    position: relative;
    opacity: 0.85;
  }

  .tarot-card-name {
    font-family: var(--serif-tc);
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--ink);
    line-height: 1.3;
    z-index: 1;
    position: relative;
    margin-bottom: 6px;
    writing-mode: horizontal-tb;
  }

  .tarot-card-tag {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 1;
  }

  /* 珍愛卡的明信片版面(橫向、一排三張) */
  .love-spread {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 32px;
    padding: 8px 0;
  }

  .love-card {
    aspect-ratio: 7 / 5;
    background: linear-gradient(135deg, #fff 0%, #fdf6f7 100%);
    border: 1px solid var(--accent-soft);
    border-radius: 4px;
    padding: 18px 16px;
    position: relative;
    box-shadow:
      0 1px 2px rgba(201, 122, 142, 0.08),
      0 8px 24px rgba(201, 122, 142, 0.10);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .love-card[data-new] {
    animation: cardSlide 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  }
  .love-card[data-new="0"] { animation-delay: 0.05s; }
  .love-card[data-new="1"] { animation-delay: 0.22s; }
  .love-card[data-new="2"] { animation-delay: 0.39s; }
  .love-card[data-new="3"] { animation-delay: 0.56s; }
  .love-card[data-new="4"] { animation-delay: 0.73s; }

  @keyframes cardSlide {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* 明信片內框(虛線細邊像郵戳區) */
  .love-card::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(201, 122, 142, 0.3);
    border-radius: 2px;
    pointer-events: none;
  }

  .love-card-num {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.25em;
    z-index: 1;
    position: relative;
    opacity: 0.85;
    margin-top: 8px;
  }

  .love-card-name {
    font-family: var(--serif-tc);
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--ink);
    z-index: 1;
    position: relative;
    line-height: 1.4;
  }

  .love-card-tag {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 9px;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    z-index: 1;
    position: absolute;
    top: 14px;
    right: 16px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 18px 4px;
    border-bottom: 1px solid var(--line-soft);
    animation: reveal 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.20s; }
  .card:nth-child(3) { animation-delay: 0.35s; }
  .card:nth-child(4) { animation-delay: 0.50s; }
  .card:nth-child(5) { animation-delay: 0.65s; }
  .card:nth-child(6) { animation-delay: 0.80s; }
  .card:nth-child(n+7) { animation-delay: 0.9s; }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  .card-num {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 28px;
    color: var(--accent);
    min-width: 48px;
    opacity: 0.85;
  }

  .card-name {
    font-size: 18px;
    letter-spacing: 0.05em;
    flex: 1;
    color: var(--ink);
  }

  .card-tag {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
  }

  .dice {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .die {
    background: linear-gradient(135deg, #fff 0%, #fdf6f7 100%);
    border: 1px solid var(--accent-soft);
    border-radius: 4px;
    padding: 28px 16px 24px;
    text-align: center;
    position: relative;
    box-shadow:
      0 1px 2px rgba(201, 122, 142, 0.08),
      0 8px 24px rgba(201, 122, 142, 0.10);
    overflow: hidden;
    aspect-ratio: 7 / 5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .die[data-new] {
    animation: cardSlide 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  }
  .die[data-new="0"] { animation-delay: 0.05s; }
  .die[data-new="1"] { animation-delay: 0.2s; }
  .die[data-new="2"] { animation-delay: 0.35s; }

  /* 內框虛線裝飾,跟珍愛卡一致 */
  .die::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(201, 122, 142, 0.3);
    border-radius: 2px;
    pointer-events: none;
  }

  .die-label {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.3em;
    margin-bottom: 12px;
    text-transform: uppercase;
    z-index: 1;
    position: relative;
  }

  .die-name {
    font-family: var(--serif-tc);
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 8px;
    z-index: 1;
    position: relative;
  }

  /* 占星符號:強制用文字字體,避免變成彩色 emoji */
  .die-sym {
    font-family: 'Cormorant Garamond', 'Times New Roman', 'Apple Symbols', 'Segoe UI Symbol', serif;
    font-variant-emoji: text;
    text-rendering: optimizeLegibility;
    font-size: 16px;
    color: var(--accent-soft);
    letter-spacing: 0.05em;
    opacity: 0.9;
    z-index: 1;
    position: relative;
  }

  /* 動作列:補抽 + 複製 */
  .actions {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .action-btn {
    background: transparent;
    border: 1px dashed var(--accent-soft);
    color: var(--ink-soft);
    padding: 12px 24px;
    font-family: var(--serif-tc);
    font-size: 13px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s ease;
    text-indent: 0.3em;
  }

  .action-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    border-style: solid;
    background: var(--accent-bg);
  }

  .action-btn.copied {
    color: var(--accent);
    border-color: var(--accent);
    border-style: solid;
    background: var(--accent-bg);
  }

  .action-btn .symbol {
    font-family: var(--serif-en);
    font-style: italic;
    margin-right: 6px;
  }

  .extra-divider {
    text-align: center;
    margin: 24px 0 8px;
    color: var(--ink-dim);
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.3em;
    position: relative;
  }

  .extra-divider::before,
  .extra-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: calc(50% - 60px);
    height: 1px;
    background: var(--line);
  }

  .extra-divider::before { left: 0; }
  .extra-divider::after { right: 0; }

  .reset {
    display: block;
    margin: 32px auto 0;
    background: none;
    border: none;
    color: var(--ink-dim);
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: color 0.3s;
  }

  .reset:hover { color: var(--ink); }

  @media (max-width: 540px) {
    .wrap { padding: 20px 16px 28px; }

    header { margin-bottom: 18px; }
    h1 { font-size: clamp(32px, 8vw, 44px); }
    h1 .tc { margin-top: 8px; font-size: 0.3em; letter-spacing: 0.4em; }

    /* 工具按鈕保持一排三個,但縮小 padding 與字級 */
    .tools { gap: 6px; margin-bottom: 14px; }
    .tool {
      padding: 10px 4px;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .controls {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 0;
      margin-bottom: 14px;
    }
    .count-group { gap: 10px; }
    .count-label { font-size: 11px; letter-spacing: 0.15em; }
    .count-input { font-size: 18px; width: 36px; }
    .draw-btn {
      flex: 1;
      padding: 10px 12px;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-indent: 0.25em;
    }

    .secondary-actions {
      width: 100%;
      gap: 6px;
    }
    .secondary-actions .action-btn {
      flex: 1;
      padding: 8px 10px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-indent: 0.18em;
    }

    /* 塔羅牌:一排最多三張、超過自動換行 */
    .tarot-spread {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .tarot-card {
      flex: none;
      min-width: 0;
      max-width: none;
      width: 100%;
      padding: 16px 6px;
      gap: 14px;
    }
    .tarot-card-icon { font-size: 24px; }
    .tarot-card-name {
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    /* 珍愛卡:維持一排三張 */
    .love-spread {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .love-card {
      padding: 12px 6px;
      aspect-ratio: 7 / 5;
    }
    .love-card-name {
      font-size: 13px;
      letter-spacing: 0.08em;
    }
    .love-card-num {
      font-size: 11px;
      margin-top: 4px;
    }
    .love-card::before { inset: 5px; }

    /* 占星骰子:維持一排三個 */
    .dice { gap: 8px; }
    .die {
      padding: 16px 6px;
      aspect-ratio: 7 / 5;
    }
    .die-name {
      font-size: 14px;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .die-sym { font-size: 14px; }
    .die::before { inset: 5px; }

    .actions { flex-direction: column; }
    .action-btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ornament">✦ ✦ ✦</div>
    <h1>
      <em>Divination</em>
      <span class="tc">抽 牌 室</span>
    </h1>
  </header>

  <div class="tools">
    <button class="tool active" data-tool="tarot">
      塔羅牌
    </button>
    <button class="tool" data-tool="love">
      珍愛卡
    </button>
    <button class="tool" data-tool="dice">
      占星骰子
    </button>
  </div>

  <div class="controls">
    <div class="count-group">
      <span class="count-label">抽 牌 數</span>
      <input type="number" class="count-input" id="count" value="3" min="1" max="78">
    </div>
    <button class="draw-btn" id="drawBtn">開 始 抽 牌</button>
    <div class="secondary-actions">
      <button class="action-btn extra-btn-combo" id="extraBtn" disabled>
        <span class="symbol">+</span><span class="extra-verb">補 抽</span>
        <input type="number" class="extra-count" id="extraCount" value="1" min="1" max="78" disabled>
        <span class="extra-suffix">張</span>
      </button>
      <button class="action-btn" id="copyBtn" disabled>
        <span class="symbol">⎘</span>複 製 結 果
      </button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="empty">— 等待你的選擇 —</div>
  </div>
</div>

<script>
  const TAROT = [
    "愚者","魔術師","女祭司","女皇","皇帝","教皇","戀人","戰車","力量","隱者",
    "命運之輪","正義","吊人","死神","節制","惡魔","高塔","星星","月亮","太陽",
    "審判","世界",
    "權杖一","權杖二","權杖三","權杖四","權杖五","權杖六","權杖七","權杖八","權杖九","權杖十",
    "權杖侍者","權杖騎士","權杖皇后","權杖國王",
    "聖杯一","聖杯二","聖杯三","聖杯四","聖杯五","聖杯六","聖杯七","聖杯八","聖杯九","聖杯十",
    "聖杯侍者","聖杯騎士","聖杯皇后","聖杯國王",
    "寶劍一","寶劍二","寶劍三","寶劍四","寶劍五","寶劍六","寶劍七","寶劍八","寶劍九","寶劍十",
    "寶劍侍者","寶劍騎士","寶劍皇后","寶劍國王",
    "錢幣一","錢幣二","錢幣三","錢幣四","錢幣五","錢幣六","錢幣七","錢幣八","錢幣九","錢幣十",
    "錢幣侍者","錢幣騎士","錢幣皇后","錢幣國王"
  ];

  const LOVE = [
    "選擇","說再見","打包","迎向未知","放下","離開",
    "接納恐懼","孤單","痛苦","靠近","等待","信任",
    "承諾","探險","清理","失落","控制","煩惱",
    "忙碌","無自我價值","心碎","接受","面對真實","在意",
    "做決定","跟隨直覺","保持希望","愛自己","對焦於渴望","慶祝",
    "幸福感","犒賞自己","作大夢","配合演出","逆向思考","連結溝通",
    "創造","全然投入","自由書寫","嘗試新的","服務","分享",
    "舞台與觀眾","靜心冥想","順勢而為","欣賞","完成","禮物"
  ];

  const PLANETS = [
    {sym:"☉", name:"太陽"},{sym:"☽", name:"月亮"},{sym:"☿", name:"水星"},
    {sym:"♀", name:"金星"},{sym:"♂", name:"火星"},{sym:"♃", name:"木星"},
    {sym:"♄", name:"土星"},{sym:"♅", name:"天王星"},{sym:"♆", name:"海王星"},
    {sym:"♇", name:"冥王星"},{sym:"☊", name:"北交點"},{sym:"☋", name:"南交點"}
  ];

  const SIGNS = [
    {sym:"♈", name:"牡羊座"},{sym:"♉", name:"金牛座"},{sym:"♊", name:"雙子座"},
    {sym:"♋", name:"巨蟹座"},{sym:"♌", name:"獅子座"},{sym:"♍", name:"處女座"},
    {sym:"♎", name:"天秤座"},{sym:"♏", name:"天蠍座"},{sym:"♐", name:"射手座"},
    {sym:"♑", name:"摩羯座"},{sym:"♒", name:"水瓶座"},{sym:"♓", name:"雙魚座"}
  ];

  const HOUSES = [
    {sym:"I", name:"第一宮"},{sym:"II", name:"第二宮"},{sym:"III", name:"第三宮"},
    {sym:"IV", name:"第四宮"},{sym:"V", name:"第五宮"},{sym:"VI", name:"第六宮"},
    {sym:"VII", name:"第七宮"},{sym:"VIII", name:"第八宮"},{sym:"IX", name:"第九宮"},
    {sym:"X", name:"第十宮"},{sym:"XI", name:"第十一宮"},{sym:"XII", name:"第十二宮"}
  ];

  // 塔羅牌對應的小圖示(用 Unicode 文字符號,不是彩色 emoji)
  const TAROT_ICONS = {
    // 大阿爾克那
    "愚者":"☼","魔術師":"⚹","女祭司":"☽","女皇":"♀","皇帝":"♂",
    "教皇":"✦","戀人":"♡","戰車":"※","力量":"∞","隱者":"⚝",
    "命運之輪":"☉","正義":"⚖","吊人":"✟","死神":"✶","節制":"≈",
    "惡魔":"⛧","高塔":"⚡","星星":"★","月亮":"☾","太陽":"☀",
    "審判":"♆","世界":"⊕"
  };

  // 花色符號
  const SUIT_ICONS = {
    "權杖":"⚘", "聖杯":"♥", "寶劍":"⚔", "錢幣":"✵"
  };

  function getTarotIcon(name) {
    if (TAROT_ICONS[name]) return TAROT_ICONS[name];
    for (const suit in SUIT_ICONS) {
      if (name.startsWith(suit)) return SUIT_ICONS[suit];
    }
    return "✦";
  }

  // 數字轉羅馬數字(顯示在牌卡編號)
  function toRoman(n) {
    const map = [["X",10],["IX",9],["V",5],["IV",4],["I",1]];
    let result = "";
    for (const [r, v] of map) {
      while (n >= v) { result += r; n -= v; }
    }
    return result;
  }

  let currentTool = 'tarot';
  let session = null;

  const tools = document.querySelectorAll('.tool');
  const countInput = document.getElementById('count');
  const drawBtn = document.getElementById('drawBtn');
  const results = document.getElementById('results');
  const extraBtnEl = document.getElementById('extraBtn');
  const copyBtnEl = document.getElementById('copyBtn');
  const extraCountEl = document.getElementById('extraCount');

  // 點擊數字框時不要觸發按鈕
  extraCountEl.addEventListener('click', (e) => e.stopPropagation());
  extraCountEl.addEventListener('mousedown', (e) => e.stopPropagation());

  // 補抽 / 補擲 — 根據當前 session 處理
  extraBtnEl.addEventListener('click', () => {
    if (!session) return;
    if (session.tool === 'dice') {
      // 占星骰子:讀補擲次數
      let n = parseInt(extraCountEl.value) || 1;
      n = Math.max(1, n);
      for (let i = 0; i < n; i++) {
        session.extras.push(drawDice());
      }
      renderDice();
    } else {
      // 塔羅 / 珍愛卡:讀補抽張數
      let n = parseInt(extraCountEl.value) || 1;
      const remaining = session.deck.length - session.order.length;
      n = Math.max(1, Math.min(n, remaining));
      drawExtraCards(n);
    }
  });

  // 複製結果 — 根據當前 session 處理
  copyBtnEl.addEventListener('click', () => {
    if (!session) return;
    if (session.tool === 'dice') {
      copyDiceResult();
    } else {
      copyCardResult();
    }
  });

  const extraVerbEl = extraBtnEl.querySelector('.extra-verb');
  const extraSuffixEl = extraBtnEl.querySelector('.extra-suffix');

  tools.forEach(btn => {
    btn.addEventListener('click', () => {
      tools.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTool = btn.dataset.tool;

      if (currentTool === 'dice') {
        countInput.disabled = true;
        countInput.value = '—';
        extraVerbEl.textContent = '補 擲';
        extraSuffixEl.textContent = '次';
      } else {
        countInput.disabled = false;
        countInput.value = '3';
        countInput.max = currentTool === 'tarot' ? 78 : 48;
        extraVerbEl.textContent = '補 抽';
        extraSuffixEl.textContent = '張';
      }

      // 切換工具時清空既有結果
      if (session) resetSession();
    });
  });

  function drawFromDeck(deck, n, exclude = new Set()) {
    const available = deck.map((_, i) => i).filter(i => !exclude.has(i));
    const picked = [];
    for (let i = 0; i < n && available.length > 0; i++) {
      const idx = Math.floor(Math.random() * available.length);
      picked.push(available[idx]);
      available.splice(idx, 1);
    }
    return picked;
  }

  function drawDice() {
    return {
      planet: PLANETS[Math.floor(Math.random() * PLANETS.length)],
      sign: SIGNS[Math.floor(Math.random() * SIGNS.length)],
      house: HOUSES[Math.floor(Math.random() * HOUSES.length)]
    };
  }

  drawBtn.addEventListener('click', () => {
    if (currentTool === 'dice') {
      session = { tool: 'dice', dice: drawDice(), extras: [], prevRenderedCount: 0 };
      renderDice();
    } else {
      const deck = currentTool === 'tarot' ? TAROT : LOVE;
      let n = parseInt(countInput.value) || 1;
      n = Math.min(Math.max(n, 1), deck.length);
      const indices = drawFromDeck(deck, n);
      session = {
        tool: currentTool,
        deck,
        drawn: new Set(indices),
        order: [...indices],
        originalCount: n,
        extras: 0,
        prevRenderedCount: 0
      };
      renderCards();
    }
  });

  function getDateStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${y}/${m}/${day} ${hh}:${mm}`;
  }

  function renderCards() {
    const { deck, order, originalCount, prevRenderedCount } = session;
    const isTarot = session.tool === 'tarot';

    let html = '';

    // 新牌的索引(相對於這次 render 中所有新牌)
    let newIdx = 0;

    if (isTarot) {
      html += `<div class="tarot-spread">`;
      order.forEach((idx, i) => {
        const isExtra = i >= originalCount;
        const isNew = i >= prevRenderedCount;
        const cardName = deck[idx];
        const icon = getTarotIcon(cardName);
        const newAttr = isNew ? ` data-new="${newIdx++}"` : '';
        html += `
          <div class="tarot-card"${newAttr}>
            <div class="tarot-card-icon">${icon}</div>
            <div class="tarot-card-name">${cardName}</div>
            ${isExtra ? '<div class="tarot-card-tag">extra</div>' : ''}
          </div>
        `;
      });
      html += `</div>`;
    } else {
      html += `<div class="love-spread">`;
      order.forEach((idx, i) => {
        const isExtra = i >= originalCount;
        const isNew = i >= prevRenderedCount;
        const cardName = deck[idx];
        const num = String(idx + 1).padStart(2, '0');
        const newAttr = isNew ? ` data-new="${newIdx++}"` : '';
        html += `
          <div class="love-card"${newAttr}>
            <div class="love-card-name">${cardName}</div>
            <div class="love-card-num">${num}</div>
            ${isExtra ? '<div class="love-card-tag">extra</div>' : ''}
          </div>
        `;
      });
      html += `</div>`;
    }

    html += `<button class="reset" id="resetBtn">— clear —</button>`;
    results.innerHTML = html;

    // 記錄這次 render 完所有的牌數,下次補抽時只有新增的會跑動畫
    session.prevRenderedCount = order.length;

    // 啟用補抽 + 複製按鈕
    const remaining = deck.length - order.length;
    extraBtnEl.disabled = (remaining <= 0);
    copyBtnEl.disabled = false;
    extraCountEl.disabled = (remaining <= 0);
    extraCountEl.max = Math.max(1, remaining);
    if (parseInt(extraCountEl.value) > remaining) {
      extraCountEl.value = Math.max(1, remaining);
    }

    document.getElementById('resetBtn').addEventListener('click', resetSession);
  }

  function drawExtraCards(n) {
    const { deck, drawn, order } = session;
    const newCards = drawFromDeck(deck, n, drawn);
    if (newCards.length === 0) return;
    newCards.forEach(idx => {
      drawn.add(idx);
      order.push(idx);
    });
    session.extras += newCards.length;
    renderCards();
  }

  function copyCardResult() {
    const { deck, order, originalCount } = session;
    const isTarot = session.tool === 'tarot';
    const toolTC = isTarot ? '塔羅牌' : '珍愛卡';
    const lines = [`【${toolTC}】 ${getDateStr()}`, ''];
    order.forEach((idx, i) => {
      // 塔羅用抽牌順序、珍愛卡用牌庫固定編號
      const num = isTarot
        ? String(i + 1).padStart(2, '0')
        : String(idx + 1).padStart(2, '0');
      const tag = i >= originalCount ? ' (補抽)' : '';
      lines.push(`${num}. ${deck[idx]}${tag}`);
    });
    copyToClipboard(lines.join('\n'), 'copyBtn');
  }

  function renderDice() {
    const { dice, extras, prevRenderedCount } = session;
    // 第 0 組是主擲、第 1..N 組是補擲。prevRenderedCount = 已 render 的組數
    // 主擲(第 0 組)要跑動畫的條件:prevRenderedCount === 0
    const mainIsNew = prevRenderedCount === 0;
    const mainAttr = mainIsNew ? ' data-new="0"' : '';
    const mainAttr2 = mainIsNew ? ' data-new="1"' : '';
    const mainAttr3 = mainIsNew ? ' data-new="2"' : '';

    let html = `
      <div class="dice">
        <div class="die"${mainAttr}>
          <div class="die-name">${dice.planet.name}</div>
          <div class="die-sym">${dice.planet.sym}</div>
        </div>
        <div class="die"${mainAttr2}>
          <div class="die-name">${dice.sign.name}</div>
          <div class="die-sym">${dice.sign.sym}</div>
        </div>
        <div class="die"${mainAttr3}>
          <div class="die-name">${dice.house.name}</div>
          <div class="die-sym">${dice.house.sym}</div>
        </div>
      </div>
    `;

    extras.forEach((roll, i) => {
      // 該組(第 i+1 組)是否為新增的
      const isNew = (i + 1) >= prevRenderedCount;
      const a1 = isNew ? ' data-new="0"' : '';
      const a2 = isNew ? ' data-new="1"' : '';
      const a3 = isNew ? ' data-new="2"' : '';
      html += `
        <div class="extra-divider">re-cast ${String(i + 2).padStart(2, '0')}</div>
        <div class="dice">
          <div class="die"${a1}>
            <div class="die-name">${roll.planet.name}</div>
            <div class="die-sym">${roll.planet.sym}</div>
          </div>
          <div class="die"${a2}>
            <div class="die-name">${roll.sign.name}</div>
            <div class="die-sym">${roll.sign.sym}</div>
          </div>
          <div class="die"${a3}>
            <div class="die-name">${roll.house.name}</div>
            <div class="die-sym">${roll.house.sym}</div>
          </div>
        </div>
      `;
    });

    html += `<button class="reset" id="resetBtn">— clear —</button>`;
    results.innerHTML = html;

    // 紀錄組數(主擲 1 組 + extras.length 組)
    session.prevRenderedCount = 1 + extras.length;

    // 啟用補擲 + 複製按鈕
    extraBtnEl.disabled = false;
    copyBtnEl.disabled = false;
    extraCountEl.disabled = false;
    extraCountEl.max = 99;

    document.getElementById('resetBtn').addEventListener('click', resetSession);
  }

  function copyDiceResult() {
    const { dice, extras } = session;
    const lines = [`【占星骰子】 ${getDateStr()}`, ''];
    const fmt = (r) => `行星 ${r.planet.sym} ${r.planet.name} / 星座 ${r.sign.sym} ${r.sign.name} / 宮位 ${r.house.name}`;
    lines.push(`01. ${fmt(dice)}`);
    extras.forEach((r, i) => {
      lines.push(`${String(i + 2).padStart(2, '0')}. ${fmt(r)} (補擲)`);
    });
    copyToClipboard(lines.join('\n'), 'copyBtn');
  }

  function copyToClipboard(text, btnId) {
    const btn = document.getElementById(btnId);
    const original = btn.innerHTML;

    const showSuccess = () => {
      btn.classList.add('copied');
      btn.innerHTML = '<span class="symbol">✓</span>已 複 製';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = original;
      }, 1800);
    };

    const showFail = () => {
      btn.innerHTML = '<span class="symbol">✕</span>複 製 失 敗';
      setTimeout(() => { btn.innerHTML = original; }, 1800);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(showSuccess).catch(() => fallbackCopy(text, showSuccess, showFail));
    } else {
      fallbackCopy(text, showSuccess, showFail);
    }
  }

  function fallbackCopy(text, onSuccess, onFail) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      onSuccess();
    } catch (e) {
      onFail();
    }
    document.body.removeChild(ta);
  }

  function resetSession() {
    session = null;
    results.innerHTML = '<div class="empty">— 等待你的選擇 —</div>';
    // 補抽 / 複製按鈕設回 disabled
    extraBtnEl.disabled = true;
    copyBtnEl.disabled = true;
    extraCountEl.disabled = true;
    extraCountEl.value = 1;
  }
</script>
</body>
</html>
